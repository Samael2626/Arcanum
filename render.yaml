version: 1

services:
  - type: web
    name: arcanum-api
    runtime: docker
    dockerfilePath: ./render.dockerfile
    region: oregon
    plan: standard

    # Variables de entorno — fijas, sin fromService (Render re-injectaba DATABASE_URL apuntando a arcanum-db)
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_URL
        value: "postgresql://postgres:Peydun1226!@pooler.supabase.com:6543/postgres?pgbouncer=true&connection_limit=1"
      - key: ADMIN_TOKEN
        value: "arc-migrate-2026-06-22"
      - key: SECRET_KEY
        value: "e8a8d9a4b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5"
      - key: ALLOWED_ORIGINS
        value: "http://localhost:3000,http://localhost:8080,https://arcanum-app-magick.web.app"
      - key: DEBUG
        value: "False"
      - key: GROQ_API_KEY
        sync: false

    # Health check: si responde /health en 5s, está vivo
    healthCheckPath: /health
    healthCheckInterval: 30

    # Auto-deploy en push a rama
    branch: feat/onboarding-5-pasos
    autoDeploy: true
