<body>

  <!-- Service Worker PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('service-worker.js').then(
          function (reg) { console.log('[ARCANUM] SW registrado:', reg.scope); },
